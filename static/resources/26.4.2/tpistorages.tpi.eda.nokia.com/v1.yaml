name: v1
schema:
  openAPIV3Schema:
    description: TPIStorage is the Schema for the tpistorages API
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
          may reject unrecognized values.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
        type: string
      kind:
        description: |-
          Kind is a string value representing the REST resource this object represents.
          Servers may infer this from the endpoint the client submits requests to.
          Cannot be updated.
          In CamelCase.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
        type: string
      metadata:
        type: object
      spec:
        description: TPIStorageSpec defines the desired state of TPIStorage
        properties:
          heartbeatInterval:
            default: 10m
            description: Interval at which the controller re-checks storage reachability.
            format: duration
            type: string
          http:
            description: HTTP protocol configuration
            properties:
              basicAuthSecret:
                description: Name of a Kubernetes Basic Authentication Secret in the same namespace.
                maxLength: 253
                minLength: 1
                pattern: ^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$
                type: string
              hostname:
                description: Hostname of the HTTP server
                minLength: 1
                pattern: '[a-z0-9._-]+'
                type: string
              https:
                description: Use HTTPS
                properties:
                  clientTlsSecret:
                    description: |-
                      Name of a Secret in the same namespace for TLS client authentication (mTLS).
                      When set, the Secret must use Kubernetes TLS Secret data keys: PEM-encoded "tls.crt"
                      and "tls.key", and may include optional "ca.crt" for PEM-encoded CA certificate(s) used
                      when verifying the server certificate (in addition to the system trust store unless skipVerify is true).
                    maxLength: 253
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$
                    type: string
                  skipVerify:
                    default: false
                    description: Skip HTTPS certificate verification
                    type: boolean
                type: object
              port:
                default: 80
                description: Port on the HTTP server to connect to
                maximum: 65535
                minimum: 1
                type: integer
            required:
              - hostname
            type: object
          protocol:
            default: HTTP
            description: Protocol to interact with TPI Storage.
            enum:
              - HTTP
            type: string
          rootPath:
            default: ""
            description: Root path on TPI Storage.
            pattern: '[a-zA-Z0-9/_.-]*'
            type: string
        required:
          - http
          - protocol
        type: object
      status:
        description: TPIStorageStatus defines the observed state of TPIStorage
        properties:
          conditions:
            description: Status conditions
            items:
              description: Condition contains details for one aspect of the current state of this API Resource.
              properties:
                lastTransitionTime:
                  description: |-
                    lastTransitionTime is the last time the condition transitioned from one status to another.
                    This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                  format: date-time
                  type: string
                message:
                  description: |-
                    message is a human readable message indicating details about the transition.
                    This may be an empty string.
                  maxLength: 32768
                  type: string
                observedGeneration:
                  description: |-
                    observedGeneration represents the .metadata.generation that the condition was set based upon.
                    For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                    with respect to the current state of the instance.
                  format: int64
                  minimum: 0
                  type: integer
                reason:
                  description: |-
                    reason contains a programmatic identifier indicating the reason for the condition's last transition.
                    Producers of specific condition types may define expected values and meanings for this field,
                    and whether the values are considered a guaranteed API.
                    The value should be a CamelCase string.
                    This field may not be empty.
                  maxLength: 1024
                  minLength: 1
                  pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                  type: string
                status:
                  description: status of the condition, one of True, False, Unknown.
                  enum:
                    - "True"
                    - "False"
                    - Unknown
                  type: string
                type:
                  description: type of condition in CamelCase or in foo.example.com/CamelCase.
                  maxLength: 316
                  pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                  type: string
              required:
                - lastTransitionTime
                - message
                - reason
                - status
                - type
              type: object
            type: array
          reachable:
            description: Whether the storage endpoint is reachable
            type: boolean
        type: object
    type: object
served: true
storage: true
subresources:
  status: {}
