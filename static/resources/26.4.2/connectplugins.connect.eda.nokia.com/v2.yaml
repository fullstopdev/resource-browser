name: v2
schema:
  openAPIV3Schema:
    description: ConnectPlugin is the Schema for the connectplugins API
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
          may reject unrecognized values.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
        type: string
      kind:
        description: |-
          Kind is a string value representing the REST resource this object represents.
          Servers may infer this from the endpoint the client submits requests to.
          Cannot be updated.
          In CamelCase.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
        type: string
      metadata:
        type: object
      spec:
        description: ConnectPluginSpec defines the desired state of ConnectPlugin
        properties:
          description:
            description: A human-readable representation of the Plugin.
            type: string
          heartbeatIntervalSeconds:
            description: |-
              The interval in seconds in which the Plugin will heartbeat.
              When the interval is 0, heartbeating will be disabled.
            type: integer
          pluginType:
            description: Indicates the type of the Cloud Management System managed by this Plugin. Eg. VMware, OpenStack.
            type: string
          requiredPlugins:
            description: |-
              A list of ConnectPlugins whose resources this ConnectPlugin will require, this signifies an explicit
              relationship between this Plugin and the Required Plugins.
            items:
              type: string
            type: array
          supportedActionables:
            description: The list of Actionable identifiers that this Plugin supports.
            items:
              type: string
            type: array
        required:
          - description
          - pluginType
        type: object
      status:
        description: ConnectPluginStatus defines the observed state of ConnectPlugin
        properties:
          stale:
            description: |-
              When a plugin registers with a certain heartbeatinterval and it does not meet that contract, Connect will assume
              that the plugin is Stale / non-responsive. An alarm is raised when the plugin is Stale.
            type: boolean
        required:
          - stale
        type: object
    type: object
served: true
storage: true
subresources:
  status: {}
