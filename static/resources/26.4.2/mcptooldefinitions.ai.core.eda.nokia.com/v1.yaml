              query:
                description: Query provider configuration
                properties:
                  expression:
                    description: EQL expression string
                    type: string
                type: object
              workflowRef:
                description: WorkflowDefinition name to use for the tool
                type: string
            type: object
            x-kubernetes-validations:
              - message: exactly one of the fields in [workflowRef query http] must be set
                rule: '[has(self.workflowRef),has(self.query),has(self.http)].filter(x,x==true).size() == 1'
