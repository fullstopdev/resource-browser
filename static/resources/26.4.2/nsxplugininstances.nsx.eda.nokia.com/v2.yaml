name: v2
schema:
  openAPIV3Schema:
    description: NSXPluginInstance is the Schema for the nsxplugininstances API
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
          may reject unrecognized values.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
        type: string
      kind:
        description: |-
          Kind is a string value representing the REST resource this object represents.
          Servers may infer this from the endpoint the client submits requests to.
          Cannot be updated.
          In CamelCase.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
        type: string
      metadata:
        type: object
      spec:
        description: NSXPluginInstanceSpec defines the desired state of NSXPluginInstance
        properties:
          authSecretRef:
            description: The name of a secret containing 'username' and 'password' keys to authenticate to vSphere.
            type: string
          externalId:
            description: The external ID of the plugin, used to identify the ConnectPlugin instance created when starting this Plugin Instance.
            type: string
          heartbeatIntervalSeconds:
            default: 10
            description: The time interval in seconds between successive heartbeats.
            type: integer
          name:
            description: The name of the plugin.
            type: string
          nsxCertificate:
            description: Optional certificate string to use to verify the server identity.
            type: string
          nsxManagementIP:
            description: NSXManagementIP is the URL to the NSX manager, without scheme.
            type: string
          nsxPollIntervalSeconds:
            default: 2
            description: The interval between polls to NSX for state changes, in seconds.
            type: integer
          nsxTlsVerify:
            default: true
            description: Whether the client will verify the server's certificate.
            type: boolean
          pluginNamespace:
            description: The namespace for the Plugin resources.
            type: string
          vCenters:
            description: |-
              VCenters is the list of vCenters managed by the NSX instance this plugin connects to. All vCenters managed by the
              NSX plugin need to be managed by a VMware plugin.
            items:
              properties:
                vCenterFQDN:
                  description: The given vCenter IP address or FQDN of the NSX compute manager.
                  type: string
                vmwarePluginName:
                  description: The Name of the VMware plugin managing the vCenter.
                  type: string
              required:
                - vCenterFQDN
                - vmwarePluginName
              type: object
            type: array
        required:
          - authSecretRef
          - externalId
          - heartbeatIntervalSeconds
          - name
          - nsxManagementIP
          - nsxPollIntervalSeconds
          - nsxTlsVerify
          - vCenters
        type: object
      status:
        description: NSXPluginInstanceStatus defines the observed state of NSXPluginInstance
        type: object
    type: object
served: true
storage: true
