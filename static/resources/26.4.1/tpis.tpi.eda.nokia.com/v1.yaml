name: v1
schema:
  openAPIV3Schema:
    description: TPI is the Schema for the tpis API
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
          may reject unrecognized values.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
        type: string
      kind:
        description: |-
          Kind is a string value representing the REST resource this object represents.
          Servers may infer this from the endpoint the client submits requests to.
          Cannot be updated.
          In CamelCase.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
        type: string
      metadata:
        type: object
      spec:
        description: TPISpec defines the desired state of TPI
        properties:
          heartbeatInterval:
            default: 10m
            description: Interval at which the controller re-checks TPI reachability.
            format: duration
            type: string
          lockObjects:
            default: false
            description: |-
              During an import, labels all objects manipulated by this TPI
              (with an add or update action) such that they are locked in the UI.
            type: boolean
          path:
            description: Path to the file on the TPI storage. This path is relative to the storage root.
            minLength: 1
            pattern: '[a-zA-Z0-9/_.-]+.xlsx'
            type: string
          storage:
            description: Reference to the TPIStorage resource.
            maxLength: 253
            minLength: 1
            pattern: ^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$
            type: string
        required:
          - path
          - storage
        type: object
      status:
        description: TPIStatus defines the observed state of TPI
        properties:
          available:
            description: Whether the TPI file can be retrieved from storage
            type: boolean
          checksum:
            description: SHA256 checksum of the retrieved TPI file
            type: string
          conditions:
            description: Status conditions
            items:
              description: Condition contains details for one aspect of the current state of this API Resource.
              properties:
                lastTransitionTime:
                  description: |-
                    lastTransitionTime is the last time the condition transitioned from one status to another.
                    This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                  format: date-time
                  type: string
                message:
                  description: |-
                    message is a human readable message indicating details about the transition.
                    This may be an empty string.
                  maxLength: 32768
                  type: string
                observedGeneration:
                  description: |-
                    observedGeneration represents the .metadata.generation that the condition was set based upon.
                    For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                    with respect to the current state of the instance.
                  format: int64
                  minimum: 0
                  type: integer
                reason:
                  description: |-
                    reason contains a programmatic identifier indicating the reason for the condition's last transition.
                    Producers of specific condition types may define expected values and meanings for this field,
                    and whether the values are considered a guaranteed API.
                    The value should be a CamelCase string.
                    This field may not be empty.
                  maxLength: 1024
                  minLength: 1
                  pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                  type: string
                status:
                  description: status of the condition, one of True, False, Unknown.
                  enum:
                    - "True"
                    - "False"
                    - Unknown
                  type: string
                type:
                  description: type of condition in CamelCase or in foo.example.com/CamelCase.
                  maxLength: 316
                  pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                  type: string
              required:
                - lastTransitionTime
                - message
                - reason
                - status
                - type
              type: object
            type: array
          timestamp:
            description: Timestamp of the last reconciliation
            type: string
          url:
            description: Full URL to the TPI file (storage location + root path + TPI path)
            type: string
        type: object
    type: object
served: true
storage: true
subresources:
  status: {}
