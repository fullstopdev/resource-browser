name: v1
schema:
  openAPIV3Schema:
    description: SharedIpService is the Schema for the SharedIpServices API
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
          may reject unrecognized values.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
        type: string
      kind:
        description: |-
          Kind is a string value representing the REST resource this object represents.
          Servers may infer this from the endpoint the client submits requests to.
          Cannot be updated.
          In CamelCase.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
        type: string
      metadata:
        type: object
      spec:
        description: SharedIpServiceSpec defines the desired state of SharedIpService
        properties:
          podLabel:
            additionalProperties:
              type: string
            description: PodLabel is the label selector used to identify pods that should share this IP
            type: object
          ports:
            description: Ports is the list of ports to be exposed by the shared IP service
            items:
              description: SharedIpServicePort defines a port that will be exposed by the shared IP service
              properties:
                name:
                  description: Name is the name of this port within the service
                  type: string
                port:
                  description: |-
                    Port is the port number that will be exposed on the shared IP
                    If a port is specified than ports on addres must not overlap
                    If unspecified than controller will allocate a free port
                  format: int32
                  maximum: 65535
                  minimum: 1
                  type: integer
                protocol:
                  default: TCP
                  description: Protocol is the network protocol (TCP, UDP, SCTP)
                  enum:
                    - TCP
                    - UDP
                    - SCTP
                  type: string
                targetPort:
                  description: TargetPort is the port number on the pod to forward traffic to
                  format: int32
                  maximum: 65535
                  minimum: 1
                  type: integer
              required:
                - name
                - targetPort
              type: object
            minItems: 1
            type: array
          serviceName:
            description: ServiceName is the name of shared service
            type: string
          serviceNamespace:
            description: ServiceNamespace is namespace for shared service
            type: string
        required:
          - podLabel
          - ports
          - serviceName
          - serviceNamespace
        type: object
      status:
        description: SharedIpServiceStatus defines the observed state of SharedIpService
        properties:
          allocatedPorts:
            description: |-
              AllocatedPorts contains the actual port allocations for each named port
              This is particularly useful when ports are auto-allocated by the controller
            items:
              description: AllocatedPortStatus represents the actual port allocation for a named port
              properties:
                name:
                  description: Name is the name of the port from the spec
                  type: string
                port:
                  description: Port is the allocated port number on the shared IP
                  format: int32
                  type: integer
                protocol:
                  description: Protocol is the network protocol
                  type: string
              required:
                - name
                - port
                - protocol
              type: object
            type: array
          assignedIP:
            description: AssignedIP is the IP address that has been assigned to this shared service
            type: string
          observedGeneration:
            description: ObservedGeneration is the generation observed by the controller
            format: int64
            type: integer
          serviceName:
            description: ServiceName is the name of the underlying Kubernetes service created
            type: string
        type: object
    type: object
served: true
storage: true
subresources:
  status: {}
