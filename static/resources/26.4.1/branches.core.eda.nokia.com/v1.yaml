additionalPrinterColumns:
  - jsonPath: .status.phase
    name: Phase
    type: string
name: v1
schema:
  openAPIV3Schema:
    description: Branch is the Schema for the Branches API
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
          may reject unrecognized values.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
        type: string
      kind:
        description: |-
          Kind is a string value representing the REST resource this object represents.
          Servers may infer this from the endpoint the client submits requests to.
          Cannot be updated.
          In CamelCase.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
        type: string
      metadata:
        type: object
      spec:
        properties:
          clusterProvider:
            description: |-
              ClusterProvider is the name of the ClusterProvider resource to use for this branch
              if not set than local cluster will be used using vcluster
            type: string
        type: object
      status:
        properties:
          address:
            description: The address of the branch API server
            type: string
          gRPCPort:
            description: The port of the EDA API server grpc proxy
            format: int32
            type: integer
          kubeconfigSecret:
            description: The Kubeconfig secret name used to connect to branch Kubernetes API server
            type: string
          phase:
            description: Phase is the current lifecycle of branch
            type: string
          port:
            description: The port of the branch EDA API server
            format: int32
            type: integer
          proxyAddress:
            description: The address of the branch cluster tunnel
            type: string
          proxyPort:
            description: The port of the branch cluster tunnel
            format: int32
            type: integer
        type: object
    type: object
    x-kubernetes-validations:
      - message: Branch name must be at most 30 characters
        rule: self.metadata.name.size() <= 30
served: true
storage: true
subresources:
  status: {}
