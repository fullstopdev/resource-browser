name: v1
schema:
  openAPIV3Schema:
    description: ClusterProvider is the Schema for the ClusterProviders API
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
          may reject unrecognized values.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
        type: string
      kind:
        description: |-
          Kind is a string value representing the REST resource this object represents.
          Servers may infer this from the endpoint the client submits requests to.
          Cannot be updated.
          In CamelCase.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
        type: string
      metadata:
        type: object
      spec:
        properties:
          address:
            description: |-
              Address is the external address where branches on this cluster provider will be accessible
              If not specified will default to load balencer ip address
            type: string
          kubeconfigSecret:
            description: KubeconfigSecret is the name of the secret containing the kubeconfig for connecting to this cluster
            type: string
          noVirtualCluster:
            description: |-
              NoVirtualCluster will run branch directly on remote kubernetes with no virtual api server.
              Only applicable when KubeconfigSecret is set and only one
              branch can be run on Kubernetes cluster as no k8s virtualization.
            type: boolean
          startPortRange:
            description: StartPortRange is the starting port number for allocating ports to services on this cluster
            format: int32
            type: integer
        type: object
      status:
        type: object
    type: object
served: true
storage: true
subresources:
  status: {}
