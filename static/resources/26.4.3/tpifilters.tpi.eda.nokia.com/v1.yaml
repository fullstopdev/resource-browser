name: v1
schema:
  openAPIV3Schema:
    description: TPIFilter is the Schema for the tpifilters API
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
          may reject unrecognized values.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
        type: string
      kind:
        description: |-
          Kind is a string value representing the REST resource this object represents.
          Servers may infer this from the endpoint the client submits requests to.
          Cannot be updated.
          In CamelCase.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
        type: string
      metadata:
        type: object
      spec:
        description: TPIFilterSpec defines the template to use to generate TPI files
        properties:
          apiObjects:
            description: Reference to any EDA Resource for TPI selection.
            items:
              properties:
                columns:
                  description: |-
                    List of columns (or parent blocks) to keep visible in the exported TPI sheet for this object.
                    When empty, every column from the schema stays visible.
                    When non-empty, only the listed columns (and the columns under a listed parent) stay visible; other optional columns are hidden in the sheet.
                    Required fields stay visible unless one of their ancestors is hidden.
                    Each entry may optionally carry a priority to order it among its siblings (lower priority first).
                  items:
                    description: |-
                      ColumnEntry declares a schema column (or parent block) to include in the exported TPI sheet,
                      optionally constraining its position among siblings via a numeric priority.
                    properties:
                      path:
                        description: |-
                          Schema path for the column (leaf or parent). Example: ".spec.members.enabled" (leaf) or ".spec.members" (parent block). Same convention as context: no "[]" in paths.
                          Common metadata paths ".labels" and ".annotations" are also valid entries.
                          Listing a parent path implicitly includes every descendant column under it.
                        minLength: 2
                        pattern: ^\.[a-zA-Z0-9_.]+$
                        type: string
                      priority:
                        description: |-
                          Priority among siblings under the same parent.
                          Lower value means the column appears before others (0 = first).
                          Columns with the same priority keep their relative schema order.
                          Columns without a priority keep schema order.
                        format: int32
                        minimum: 0
                        type: integer
                    required:
                      - path
                    type: object
                  type: array
                excludedColumns:
                  description: 'List of columns to exclude from the exported TPI for this object. This follows the same convention as the context: [] are stripped from the paths. Required fields cannot be excluded. For example: in case of Interface kind, ".spec.members.enabled". Common TPI metadata columns can also be excluded: ".labels" and ".annotations".'
                  items:
                    type: string
                  type: array
                group:
                  description: 'Group of the object to include, excluding an apiVersion. For example: "interfaces.eda.nokia.com"'
                  maxLength: 253
                  minLength: 1
                  pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                  type: string
                kind:
                  description: 'Kind of the object to include, case-sensitive. For example: "Interface"'
                  maxLength: 63
                  minLength: 1
                  pattern: ^[a-zA-Z]([-A-Za-z0-9]*[A-Za-z0-9])?$
                  type: string
                labelSelector:
                  description: |-
                    Only include objects that match any of the provided labels. For example: in case of Interface kind, "eda.nokia.com/role=edge"
                    Multiple selectors can be provided to form an OR condition. Within each selector, multiple requirements can be specified as comma-separated key=value pairs to form an AND condition.
                  items:
                    type: string
                  type: array
              required:
                - group
                - kind
              type: object
            type: array
          debug:
            description: Advanced export controls.
            properties:
              disableStyling:
                default: false
                description: |-
                  When enabled, TPIs generated using this filter will not have any comments, styling,
                  data validation or conditional formatting rules.
                type: boolean
            type: object
          hideEmptyColumns:
            default: false
            description: |-
              When enabled, sheets in TPIs generated using this filter will be post-processed
              such that columns for optional fields that are empty across all resources will be hidden.
            type: boolean
          includeChildResources:
            default: false
            description: |-
              Whether to include child resources (e.g., a BridgeDomain derived from a VirtualNetwork)
              in TPIs generated using this filter.
            type: boolean
          includeResources:
            default: true
            description: |-
              Whether to include resources in TPIs generated using this filter.
              If false, only a blank TPI template will be generated.
            type: boolean
          namespace:
            description: |-
              Namespace containing the objects to export when this filter is used.
              If empty, the workflow namespace is used.
            maxLength: 63
            minLength: 1
            pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
            type: string
        type: object
      status:
        description: TPIFilterStatus defines the observed state of TPIFilter
        type: object
    type: object
served: true
storage: true
subresources:
  status: {}
