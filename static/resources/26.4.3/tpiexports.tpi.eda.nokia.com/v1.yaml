name: v1
schema:
  openAPIV3Schema:
    description: TPIExport is the Schema for the tpiexports API
    properties:
      apiVersion:
        description: |-
          APIVersion defines the versioned schema of this representation of an object.
          Servers should convert recognized schemas to the latest internal value, and
          may reject unrecognized values.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
        type: string
      kind:
        description: |-
          Kind is a string value representing the REST resource this object represents.
          Servers may infer this from the endpoint the client submits requests to.
          Cannot be updated.
          In CamelCase.
          More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
        type: string
      metadata:
        type: object
      spec:
        description: TPIExportSpec defines the desired state of TPIExport
        properties:
          path:
            description: Path to the TPI file to be created. If TPI Storage is provided, this path is relative to the storage root.
            minLength: 1
            pattern: '[a-zA-Z0-9/_.-]+.xlsx'
            type: string
          tpiStorage:
            description: Reference to the TPIStorage resource. If left empty, the xlxs will only be available in the workflow artifacts.
            maxLength: 253
            minLength: 1
            pattern: ^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$
            type: string
          tpifilter:
            description: TPIFilter to be used on the export. If left empty, export all API resources available to the current user.
            maxLength: 253
            minLength: 1
            pattern: ^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$
            type: string
        required:
          - path
        type: object
      status:
        description: TPIExportStatus defines the observed state of TPIExport
        properties:
          exportedTpi:
            type: string
          objects:
            description: Number of objects discovered
            items:
              properties:
                count:
                  description: Number of objects of this group and kind
                  type: integer
                group:
                  description: Group to which metrics relate
                  type: string
                kind:
                  description: Kind to which metrics relate
                  type: string
              required:
                - count
                - group
                - kind
              type: object
            type: array
          schemas:
            description: Number of schemas discovered
            minimum: 0
            type: integer
          stages:
            description: Time consumed per stage
            items:
              properties:
                end:
                  description: End time of the stage
                  type: string
                name:
                  description: Name of the stage to which timings apply
                  type: string
                start:
                  description: Start time of the stage
                  type: string
                total:
                  description: Total stage execution time in seconds
                  type: integer
              required:
                - end
                - name
                - start
                - total
              type: object
            type: array
        required:
          - objects
          - schemas
          - stages
        type: object
    type: object
served: true
storage: true
subresources:
  status: {}
