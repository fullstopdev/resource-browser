# Cloudflare Pages + SvelteKit (adapter-cloudflare)
# Local AI: export CLOUDFLARE_API_TOKEN=... then npm run dev:ai
name = "eda-resource-browser"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

[ai]
binding = "AI"
remote = true

# Vectorize RAG (optional until index exists + API token has Vectorize Edit).
# Create index: see README "Vectorize RAG". Then uncomment below and run embed:crd-corpus.
# [[vectorize]]
# binding = "CRD_INDEX"
# index_name = "eda-crd-corpus-v1"
