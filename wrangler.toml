# Cloudflare Pages + SvelteKit (adapter-cloudflare)
# Local AI: export CLOUDFLARE_API_TOKEN=... then npm run dev:ai
name = "eda-resource-browser"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

[ai]
binding = "AI"
remote = true

# Vectorize RAG (optional until indexes exist + API token has Vectorize Edit).
# Create indexes: see README "Vectorize RAG". Then run embed:crd-corpus and embed:eda-docs.
[[vectorize]]
binding = "CRD_INDEX"
index_name = "eda-crd-corpus-v1"
remote = true

[[vectorize]]
binding = "DOCS_INDEX"
index_name = "eda-docs-v1"
remote = true

# KV namespace for deterministic Workers AI action cache (explain, example, field, compare, spec-search).
# Create with: wrangler kv namespace create AI_CACHE
# Then replace the placeholder ids below and create a preview namespace for local dev:
#   wrangler kv namespace create AI_CACHE --preview
[[kv_namespaces]]
binding = "AI_CACHE"
id = "06b84b44600849429b8261860de24a8d"
preview_id = "31bfde8f0dd04659a33f5cedac0ab9e9"
