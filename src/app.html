<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/images/eda.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Nokia EDA Resource Browser - browse and compare Nokia EDA Custom Resource Definitions (CRDs) across releases."
		/>
		<meta name="google-site-verification" content="Sxt0AqrCcTGFPpACR8X4Wt5-2RisEJna6DzWjOpQkDM" />

		<!-- Inline critical above-the-fold CSS so homepage hero/search paint before the main bundle -->
		<style id="critical-home">
			*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
			html{font-size:14px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
			body{min-height:100vh;font-family:'NokiaPureText',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:#0f172a;background:#fff;overflow-x:hidden}
			.dark body{color:#f1f5f9;background:linear-gradient(160deg,#071428 0%,#0c2340 50%,#0e2d52 100%)}
			.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
			.page-shell{min-height:100%}
			.app-header{position:sticky;top:0;z-index:50;border-bottom:1px solid #e2e8f0;background:#fff}
			.dark .app-header{border-bottom-color:#334155;background:rgba(15,23,42,.95)}
			.homepage-welcome{color:#0f172a;background:#f8fafc}
			.dark .homepage-welcome{color:#f1f5f9;background:transparent}
			.homepage-main{width:100%;max-width:80rem;margin:0 auto;padding:1rem .875rem 3rem;display:flex;flex-direction:column;gap:1.25rem}
			.homepage-hero{width:100%;border-radius:.5rem;border:1px solid #e2e8f0;background:linear-gradient(135deg,rgba(239,246,255,.9) 0%,rgba(255,255,255,.95) 55%,rgba(248,250,252,1) 100%);padding:.875rem 1rem;box-shadow:0 1px 3px rgba(15,23,42,.04)}
			.dark .homepage-hero{border-color:rgba(56,100,150,.35);background:linear-gradient(135deg,rgba(37,99,235,.14) 0%,rgba(15,42,72,.55) 100%)}
			.homepage-hero-kicker{font-size:.6875rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#2563eb;margin-bottom:.375rem}
			.dark .homepage-hero-kicker{color:#60a5fa}
			.homepage-title{font-size:1.125rem;font-weight:700;line-height:1.25;letter-spacing:-.02em;color:#0f172a}
			.dark .homepage-title{color:#f8fafc}
			.homepage-search-zone{display:flex;flex-direction:column;gap:.75rem}
			.homepage-search-input{display:flex;align-items:center;gap:.5rem;min-height:2.25rem;border-radius:.5rem;border:1px solid #e2e8f0;background:#fff;padding:.5rem .75rem;box-shadow:0 1px 2px rgba(15,23,42,.04)}
			.dark .homepage-search-input{border-color:rgba(56,100,150,.35);background:rgba(15,42,72,.88)}
			.homepage-search-icon{height:1rem;width:1rem;flex-shrink:0;color:#94a3b8}
			.homepage-search-field{width:100%;min-height:1.25rem;border:none;background:transparent;font-family:'NokiaPureText',system-ui,-apple-system,sans-serif;font-size:.8125rem;line-height:1.4;color:#0f172a;outline:none}
			.homepage-search-field::placeholder{color:#94a3b8;opacity:1}
			.dark .homepage-search-field{color:#f8fafc}
			.dark .homepage-search-field::placeholder{color:#64748b}
			.homepage-train-label{display:inline-flex;align-items:center;justify-content:center;min-height:1.625rem;contain:layout style}
		</style>
		<!-- Preload critical LCP images -->
		<link rel="preload" as="image" href="%sveltekit.assets%/images/bird-logo.svg" />
		<link rel="preload" as="image" href="%sveltekit.assets%/images/eda.svg" />
		<!-- Preload background image (LCP) only for larger viewports; mobile uses a CSS gradient to
          avoid downloading a large image and improve LCP. If you add a mobile-optimized image,
          you can preload it here with a media attribute for (max-width:768px). -->
		<!-- Preload only the desktop hero image (larger screens) so the browser can prioritize it for LCP. -->
		<link
			rel="preload"
			as="image"
			href="%sveltekit.assets%/images/background-1920.webp"
			media="(min-width: 1200px)"
		/>
		<!-- Preload only the critical headline and body weights (prefer woff2 for smaller payloads); browsers will fall back
          to TTF if woff2 isn't available. Ensure WOFF2 fonts are generated in /static/fonts for best performance. -->
		<link
			rel="preload"
			as="font"
			href="%sveltekit.assets%/fonts/NokiaPureText_Rg.woff2"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			as="font"
			href="%sveltekit.assets%/fonts/NokiaPureHeadline_XBd.woff2"
			type="font/woff2"
			crossorigin
		/>

		%sveltekit.head%
		<script>
			(function () {
				try {
					var stored = localStorage.getItem('theme');
					var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					var isDark = stored === 'dark' || (stored !== 'light' && prefersDark);
					document.documentElement.classList.toggle('dark', isDark);
				} catch (e) {
					/* default to light when storage is unavailable */
					document.documentElement.classList.remove('dark');
				}
			})();
		</script>
	</head>

	<body class="scroll-thin bg-white antialiased text-slate-900 dark:bg-slate-900 dark:text-slate-100" data-sveltekit-preload-data="hover">
		<div id="app-root">%sveltekit.body%</div>
	</body>
</html>
